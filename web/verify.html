<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT認証</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 0 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #71717a;
            font-size: 14px;
            font-weight: 400;
        }

        .discord-tag {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 24px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .discord-tag .icon {
            width: 32px;
            height: 32px;
            background: #5865f2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .discord-tag .text {
            flex: 1;
            font-size: 14px;
            color: #a1a1aa;
        }

        .discord-tag .value {
            font-family: 'SF Mono', monospace;
            color: #ffffff;
            font-size: 13px;
        }

        .server-info {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-info .icon {
            width: 32px;
            height: 32px;
            background: #10b981;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .server-info .text {
            flex: 1;
            font-size: 14px;
            color: #a1a1aa;
        }

        .server-info .value {
            font-family: 'SF Mono', monospace;
            color: #ffffff;
            font-size: 13px;
        }

        .action-area {
            margin: 32px 0;
        }

        .wallet-button {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .wallet-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wallet-button:hover::before {
            opacity: 1;
        }

        .wallet-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.4);
        }

        .wallet-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .wallet-button .content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verify-button {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .verify-button.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4);
        }

        .wallet-info {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .wallet-info.show {
            display: flex;
        }

        .wallet-info .icon {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .wallet-info .text {
            flex: 1;
            font-size: 14px;
            color: #a1a1aa;
        }

        .wallet-info .value {
            font-family: 'SF Mono', monospace;
            color: #ffffff;
            font-size: 13px;
        }

        .status {
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .status.loading {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #6366f1;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            border-radius: 2px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .wallet-selection {
            margin: 16px 0;
            display: none;
        }

        .wallet-selection.show {
            display: block;
        }

        .wallet-option {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-option:hover {
            border-color: #6366f1;
            background: #2a2a2a;
        }

        .wallet-option.selected {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .wallet-option .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .wallet-option .text {
            flex: 1;
            font-size: 14px;
            color: #ffffff;
        }

        .wallet-option .description {
            font-size: 12px;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✨</div>
            <h1>NFT認証</h1>
            <p class="subtitle">Discordロールを取得するためにNFTを認証してください</p>
        </div>

        <div class="discord-tag">
            <div class="icon">🎮</div>
            <div class="text">Discord ID:</div>
            <div class="value" id="discord-id">Loading...</div>
        </div>

        <div class="server-info">
            <div class="icon">🏠</div>
            <div class="text">サーバー:</div>
            <div class="value" id="server-name">Mona Syndicate Tokyo</div>
        </div>

        <div class="action-area">
            <button class="wallet-button" id="connect-btn" onclick="showWalletSelection()">
                <div class="content">
                    <span>🔗</span>
                    <span>ウォレットを選択</span>
                </div>
            </button>

            <div class="wallet-selection" id="wallet-selection">
                <div class="wallet-option" onclick="connectWallet('sui')">
                    <div class="icon" style="background: #6366f1;">💧</div>
                    <div class="text">Sui Wallet</div>
                    <div class="description">公式Suiウォレット</div>
                </div>
                <div class="wallet-option" onclick="connectWallet('suiet')">
                    <div class="icon" style="background: #8b5cf6;">🔮</div>
                    <div class="text">Suiet Wallet</div>
                    <div class="description">人気のSuiウォレット</div>
                </div>
                <div class="wallet-option" onclick="connectWallet('martian')">
                    <div class="icon" style="background: #f59e0b;">🚀</div>
                    <div class="text">Martian Wallet</div>
                    <div class="description">マルチチェーンウォレット</div>
                </div>
                <div class="wallet-option" onclick="connectWallet('slush')">
                    <div class="icon" style="background: #0ea5e9;">❄️</div>
                    <div class="text">SlushWallet</div>
                    <div class="description">Sui系Slushウォレット</div>
                </div>
                <div class="wallet-option" onclick="connectWallet('demo')">
                    <div class="icon" style="background: #10b981;">🧪</div>
                    <div class="text">Demo Wallet</div>
                    <div class="description">テスト用デモウォレット</div>
                </div>
            </div>

            <div class="wallet-info" id="wallet-info">
                <div class="icon">💎</div>
                <div class="text">ウォレット:</div>
                <div class="value" id="wallet-address"></div>
            </div>

            <div class="progress" id="progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="status" id="status">
                <div class="spinner" id="spinner"></div>
                <span id="status-text"></span>
            </div>

            <button class="verify-button" id="verify-btn" onclick="startVerification()">
                <div class="content">
                    <span>✨</span>
                    <span>認証開始</span>
                </div>
            </button>
        </div>
    </div>

    <script>
        let connectedWallet = null;
        let walletAddress = null;
        let discordId = null;
        let selectedWalletType = null;
        
        // APIベースURLを環境に応じて設定
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : window.location.origin;

        // URLパラメータからDiscord IDを取得
        const urlParams = new URLSearchParams(window.location.search);
        discordId = urlParams.get('discord_id');
        
        if (discordId) {
            document.getElementById('discord-id').textContent = discordId.slice(0, 8) + '...';
        } else {
            showStatus('error', 'Discord IDが見つかりません');
        }

        // サーバー情報を取得
        async function loadServerInfo() {
            try {
                const response = await fetch(`${API_BASE_URL}/server-info`);
                if (response.ok) {
                    const serverInfo = await response.json();
                    document.getElementById('server-name').textContent = serverInfo.name;
                }
            } catch (error) {
                console.error('Failed to load server info:', error);
            }
        }

        // ページ読み込み時にサーバー情報を取得
        loadServerInfo();

        // ウォレット選択を表示
        window.showWalletSelection = function() {
            document.getElementById('wallet-selection').classList.add('show');
            document.getElementById('connect-btn').style.display = 'none';
        };

        // ウォレット接続
        window.connectWallet = async function(walletType) {
            selectedWalletType = walletType;
            showStatus('loading', `${getWalletName(walletType)}に接続中...`);
            
            try {
                console.log(`🔍 Connecting to ${getWalletName(walletType)}...`);
                
                let wallet = null;
                
                switch(walletType) {
                    case 'sui':
                        wallet = await connectSuiWallet();
                        break;
                    case 'suiet':
                        wallet = await connectSuietWallet();
                        break;
                    case 'martian':
                        wallet = await connectMartianWallet();
                        break;
                    case 'slush':
                        wallet = await connectSlushWallet();
                        break;
                    case 'demo':
                        wallet = await connectDemoWallet();
                        break;
                    default:
                        throw new Error('サポートされていないウォレットタイプです');
                }
                
                if (wallet && wallet.address) {
                    walletAddress = wallet.address;
                    connectedWallet = wallet;
                    
                    console.log(`Connected to wallet: ${walletAddress}`);
                    showStatus('success', `${getWalletName(walletType)}に接続しました`);
                    
                    // UI更新
                    document.getElementById('wallet-selection').classList.remove('show');
                    document.getElementById('verify-btn').classList.add('show');
                    document.getElementById('wallet-info').classList.add('show');
                    document.getElementById('wallet-address').textContent = walletAddress.slice(0, 8) + '...' + walletAddress.slice(-6);
                } else {
                    throw new Error('ウォレットの接続に失敗しました');
                }
            } catch (error) {
                console.error('Wallet connection error:', error);
                showStatus('error', error.message || 'ウォレット接続に失敗しました');
                document.getElementById('wallet-selection').classList.remove('show');
                document.getElementById('connect-btn').style.display = 'block';
            }
        };

        // Sui Wallet接続
        async function connectSuiWallet() {
            if (!window.suiWallet) {
                throw new Error('Sui Walletがインストールされていません。Chrome Web Storeからインストールしてください。');
            }
            
            try {
                const accounts = await window.suiWallet.request({ method: 'eth_accounts' });
                if (!accounts || accounts.length === 0) {
                    throw new Error('アカウントが見つかりません');
                }
                
                return {
                    address: accounts[0],
                    signMessage: async (message) => {
                        const signature = await window.suiWallet.request({
                            method: 'personal_sign',
                            params: [message, accounts[0]]
                        });
                        return { signature };
                    }
                };
            } catch (error) {
                throw new Error('Sui Walletの接続に失敗しました: ' + error.message);
            }
        }

        // Suiet Wallet接続
        async function connectSuietWallet() {
            if (!window.suiet) {
                throw new Error('Suiet Walletがインストールされていません。Chrome Web Storeからインストールしてください。');
            }
            
            try {
                const accounts = await window.suiet.request({ method: 'eth_accounts' });
                if (!accounts || accounts.length === 0) {
                    throw new Error('アカウントが見つかりません');
                }
                
                return {
                    address: accounts[0],
                    signMessage: async (message) => {
                        const signature = await window.suiet.request({
                            method: 'personal_sign',
                            params: [message, accounts[0]]
                        });
                        return { signature };
                    }
                };
            } catch (error) {
                throw new Error('Suiet Walletの接続に失敗しました: ' + error.message);
            }
        }

        // Martian Wallet接続
        async function connectMartianWallet() {
            if (!window.martian) {
                throw new Error('Martian Walletがインストールされていません。Chrome Web Storeからインストールしてください。');
            }
            
            try {
                const accounts = await window.martian.request({ method: 'eth_accounts' });
                if (!accounts || accounts.length === 0) {
                    throw new Error('アカウントが見つかりません');
                }
                
                return {
                    address: accounts[0],
                    signMessage: async (message) => {
                        const signature = await window.martian.request({
                            method: 'personal_sign',
                            params: [message, accounts[0]]
                        });
                        return { signature };
                    }
                };
            } catch (error) {
                throw new Error('Martian Walletの接続に失敗しました: ' + error.message);
            }
        }

        // SlushWallet接続
        async function connectSlushWallet() {
            if (!window.slushWallet) {
                throw new Error('SlushWalletがインストールされていません。');
            }
            try {
                const accounts = await window.slushWallet.request({ method: 'eth_accounts' });
                if (!accounts || accounts.length === 0) {
                    throw new Error('アカウントが見つかりません');
                }
                return {
                    address: accounts[0],
                    signMessage: async (message) => {
                        const signature = await window.slushWallet.request({
                            method: 'personal_sign',
                            params: [message, accounts[0]]
                        });
                        return { signature };
                    }
                };
            } catch (error) {
                throw new Error('SlushWalletの接続に失敗しました: ' + error.message);
            }
        }

        // Demo Wallet接続
        async function connectDemoWallet() {
            // デモ用のウォレットアドレスを生成
            const demoAddress = '0x' + Math.random().toString(16).substr(2, 40);
            
            return {
                address: demoAddress,
                signMessage: async (message) => {
                    // デモ用の署名を生成
                    // messageがUint8Arrayの場合は文字列に変換
                    let messageStr = message;
                    if (message instanceof Uint8Array) {
                        messageStr = new TextDecoder().decode(message);
                    }
                    console.log('Demo wallet signing message:', messageStr);
                    const signature = '0x' + Math.random().toString(16).substr(2, 128);
                    return { signature };
                }
            };
        }

        // ウォレット名を取得
        function getWalletName(walletType) {
            switch(walletType) {
                case 'sui': return 'Sui Wallet';
                case 'suiet': return 'Suiet Wallet';
                case 'martian': return 'Martian Wallet';
                case 'slush': return 'SlushWallet';
                case 'demo': return 'Demo Wallet';
                default: return 'Unknown Wallet';
            }
        }

        // 認証開始
        window.startVerification = async function() {
            if (!walletAddress || !discordId) {
                showStatus('error', '接続情報が不完全です');
                return;
            }

            document.getElementById('progress').classList.add('show');
            setProgress(0);

            try {
                // ナンス取得
                setProgress(25);
                showStatus('loading', 'ナンス生成中...');
                
                const nonceRes = await fetch(`${API_BASE_URL}/nonce`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet_address: walletAddress })
                });

                if (!nonceRes.ok) throw new Error('ナンス取得失敗');
                const { nonce } = await nonceRes.json();

                // 署名
                setProgress(50);
                showStatus('loading', 'ウォレットで署名...');
                
                const message = `Verify NFT ownership for Discord role.\nNonce: ${nonce}\nAddress: ${walletAddress}`;
                const messageBytes = new TextEncoder().encode(message);

                let signature = '';
                
                // 署名処理
                try {
                    const signResult = await connectedWallet.signMessage(messageBytes);
                    signature = signResult.signature || signResult;
                } catch (signError) {
                    console.error('Sign error:', signError);
                    throw new Error('署名に失敗しました: ' + signError.message);
                }

                // 認証
                setProgress(75);
                showStatus('loading', 'NFT確認中...');
                
                const verifyRes = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        wallet_address: walletAddress,
                        discord_id: discordId,
                        signature: signature,
                        nonce: nonce
                    })
                });

                const result = await verifyRes.json();

                setProgress(100);
                if (result.success) {
                    showStatus('success', '認証完了！Discordを確認してください');
                    setTimeout(() => window.close(), 3000);
                } else {
                    showStatus('error', result.message);
                }

            } catch (error) {
                console.error('Verification error:', error);
                showStatus('error', error.message || '認証に失敗しました');
                document.getElementById('progress').classList.remove('show');
            }
        };

        function showStatus(type, message) {
            const status = document.getElementById('status');
            const text = document.getElementById('status-text');
            const spinner = document.getElementById('spinner');
            
            status.className = `status ${type}`;
            text.textContent = message;
            spinner.style.display = type === 'loading' ? 'block' : 'none';
            status.classList.add('show');
        }

        function setProgress(percent) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }
    </script>
</body>
</html>
