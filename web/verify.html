<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT認証</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 0 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #71717a;
            font-size: 14px;
            font-weight: 400;
        }

        .discord-tag {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 24px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .discord-tag .icon {
            width: 32px;
            height: 32px;
            background: #5865f2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .discord-tag .text {
            flex: 1;
            font-size: 14px;
            color: #a1a1aa;
        }

        .discord-tag .value {
            font-family: 'SF Mono', monospace;
            color: #ffffff;
            font-size: 13px;
        }

        .action-area {
            margin: 32px 0;
        }

        .wallet-button {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .wallet-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wallet-button:hover::before {
            opacity: 1;
        }

        .wallet-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.4);
        }

        .wallet-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .wallet-button .content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .status {
            margin: 24px 0;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .status.loading {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            display: flex;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            display: flex;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            display: flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(251, 191, 36, 0.3);
            border-top: 2px solid #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress {
            width: 100%;
            height: 4px;
            background: #1e1e1e;
            border-radius: 2px;
            overflow: hidden;
            margin: 16px 0;
            display: none;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            width: 0;
            transition: width 0.5s ease;
        }

        .verify-button {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: none;
        }

        .verify-button.show {
            display: block;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(34, 197, 94, 0.4);
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
            
            .logo {
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎨</div>
            <h1>NFT認証</h1>
            <p class="subtitle">ウォレットを接続して認証</p>
        </div>

        <div class="discord-tag">
            <div class="icon">💬</div>
            <div class="text">Discord ID</div>
            <div class="value" id="discord-id">---</div>
        </div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="action-area">
            <button class="wallet-button" id="connect-btn" onclick="connectWallet()">
                <div class="content">
                    <span>🔗</span>
                    <span>Sui Walletに接続</span>
                </div>
            </button>

            <div class="status" id="status">
                <div class="spinner" id="spinner"></div>
                <span id="status-text"></span>
            </div>

            <button class="verify-button" id="verify-btn" onclick="startVerification()">
                <div class="content">
                    <span>✨</span>
                    <span>認証開始</span>
                </div>
            </button>
        </div>
    </div>

    <script>
        let connectedWallet = null;
        let walletAddress = null;
        let discordId = null;
        
        // APIベースURLを環境に応じて設定
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8787' 
            : 'https://nft-verification-production.mona-syndicatextokyo.workers.dev';

        // URLパラメータからDiscord IDを取得
        const urlParams = new URLSearchParams(window.location.search);
        discordId = urlParams.get('discord_id');
        
        if (discordId) {
            document.getElementById('discord-id').textContent = discordId.slice(0, 8) + '...';
        } else {
            showStatus('error', 'Discord IDが見つかりません');
        }

        // ウォレット検出関数
        function detectWallets() {
            console.log('🔍 Detecting wallets...');
            
            const wallets = [];
            
            // Suiet Wallet
            if (window.suiet) {
                wallets.push({ name: 'Suiet Wallet', wallet: window.suiet });
            }
            
            // Martian Wallet
            if (window.martian) {
                wallets.push({ name: 'Martian Wallet', wallet: window.martian });
            }
            
            // Ethos Wallet
            if (window.ethos) {
                wallets.push({ name: 'Ethos Wallet', wallet: window.ethos });
            }
            
            // OneKey Wallet
            if (window.onekey) {
                wallets.push({ name: 'OneKey Wallet', wallet: window.onekey });
            }
            
            // 一般的なSuiウォレット
            if (window.suiWallet) {
                wallets.push({ name: 'Sui Wallet', wallet: window.suiWallet });
            }
            
            // その他のウォレット
            for (const key in window) {
                const obj = window[key];
                if (obj && typeof obj === 'object' && 
                    (key.toLowerCase().includes('sui') || 
                     key.toLowerCase().includes('wallet'))) {
                    wallets.push({ name: key, wallet: obj });
                }
            }
            
            console.log(`Found ${wallets.length} wallets:`, wallets.map(w => w.name));
            return wallets;
        }

        // ウォレット接続
        window.connectWallet = async function() {
            showStatus('loading', 'ウォレットを検索中...');
            
            try {
                const wallets = detectWallets();
                
                if (wallets.length === 0) {
                    // デモ用のモックウォレット（開発時のみ）
                    if (window.location.hostname === 'localhost') {
                        console.log('Using demo wallet for development');
                        const demoWallet = {
                            name: 'Demo Wallet',
                            connect: async () => ({ accounts: [{ address: '0x1234567890abcdef1234567890abcdef12345678' }] }),
                            signMessage: async (message) => ({ signature: '0x' + 'a'.repeat(128) })
                        };
                        wallets.push({ name: 'Demo Wallet', wallet: demoWallet });
                    } else {
                        throw new Error('Suiウォレットが見つかりません。Suiet Wallet、Martian Wallet、またはEthos Walletをインストールしてください。');
                    }
                }

                // 最初に見つかったウォレットを使用
                const selectedWallet = wallets[0];
                console.log(`Using wallet: ${selectedWallet.name}`);
                
                showStatus('loading', `${selectedWallet.name}に接続中...`);

                // ウォレット接続処理
                let accounts = [];
                
                try {
                    const wallet = selectedWallet.wallet;
                    
                    if (wallet.connect) {
                        const result = await wallet.connect();
                        accounts = result.accounts || result;
                    } else if (wallet.request) {
                        const result = await wallet.request({ method: 'eth_requestAccounts' });
                        accounts = result;
                    } else if (wallet.getAccounts) {
                        accounts = await wallet.getAccounts();
                    } else if (wallet.getAccount) {
                        const account = await wallet.getAccount();
                        accounts = [account];
                    } else if (wallet.accounts && wallet.accounts.length > 0) {
                        accounts = wallet.accounts;
                    } else if (wallet.account) {
                        accounts = [wallet.account];
                    }
                } catch (connectError) {
                    console.log('Standard connect failed, trying alternative methods');
                    
                    // 代替接続方法
                    const wallet = selectedWallet.wallet;
                    if (wallet.accounts && wallet.accounts.length > 0) {
                        accounts = wallet.accounts;
                    } else if (wallet.account) {
                        accounts = [wallet.account];
                    }
                }

                if (accounts && accounts.length > 0) {
                    walletAddress = accounts[0].address || accounts[0];
                    connectedWallet = selectedWallet.wallet;
                    
                    showStatus('success', `接続成功: ${walletAddress.slice(0, 8)}...`);
                    document.getElementById('verify-btn').classList.add('show');
                    document.getElementById('connect-btn').style.display = 'none';
                } else {
                    throw new Error('アカウントが取得できませんでした');
                }

            } catch (error) {
                console.error('Connection error:', error);
                showStatus('error', error.message || 'ウォレット接続に失敗しました');
            }
        };

        // 認証開始
        window.startVerification = async function() {
            if (!walletAddress || !discordId) {
                showStatus('error', '接続情報が不完全です');
                return;
            }

            document.getElementById('progress').classList.add('show');
            setProgress(0);

            try {
                // ナンス取得
                setProgress(25);
                showStatus('loading', 'ナンス生成中...');
                
                const nonceRes = await fetch(`${API_BASE_URL}/nonce`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet_address: walletAddress })
                });

                if (!nonceRes.ok) throw new Error('ナンス取得失敗');
                const { nonce } = await nonceRes.json();

                // 署名
                setProgress(50);
                showStatus('loading', 'ウォレットで署名...');
                
                const message = `Verify NFT for Discord.\nNonce: ${nonce}\nAddress: ${walletAddress}`;
                const messageBytes = new TextEncoder().encode(message);

                let signature = '';
                
                // 署名処理
                try {
                    if (connectedWallet.signMessage) {
                        const signResult = await connectedWallet.signMessage(messageBytes);
                        signature = signResult.signature || signResult;
                    } else if (connectedWallet.request) {
                        const signResult = await connectedWallet.request({
                            method: 'personal_sign',
                            params: [message, walletAddress]
                        });
                        signature = signResult;
                    } else if (connectedWallet.sign) {
                        const signResult = await connectedWallet.sign(messageBytes);
                        signature = signResult.signature || signResult;
                    } else if (connectedWallet.signTransaction) {
                        const signResult = await connectedWallet.signTransaction(messageBytes);
                        signature = signResult.signature || signResult;
                    } else {
                        throw new Error('署名機能が見つかりません');
                    }
                } catch (signError) {
                    console.error('Sign error:', signError);
                    throw new Error('署名に失敗しました: ' + signError.message);
                }

                // 認証
                setProgress(75);
                showStatus('loading', 'NFT確認中...');
                
                const verifyRes = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        wallet_address: walletAddress,
                        discord_id: discordId,
                        signature: signature,
                        nonce: nonce
                    })
                });

                const result = await verifyRes.json();

                setProgress(100);
                if (result.success) {
                    showStatus('success', '認証完了！Discordを確認してください');
                    setTimeout(() => window.close(), 3000);
                } else {
                    showStatus('error', result.message);
                }

            } catch (error) {
                console.error('Verification error:', error);
                showStatus('error', error.message || '認証に失敗しました');
                document.getElementById('progress').classList.remove('show');
            }
        };

        function showStatus(type, message) {
            const status = document.getElementById('status');
            const text = document.getElementById('status-text');
            const spinner = document.getElementById('spinner');
            
            status.className = `status ${type}`;
            text.textContent = message;
            spinner.style.display = type === 'loading' ? 'block' : 'none';
        }

        function setProgress(percent) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }
    </script>
</body>
</html>
