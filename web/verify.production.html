<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT認証</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.connecting {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .wallet-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐 NFT認証</div>
        
        <div id="status" class="status connecting">
            Discord認証を開始しています...
        </div>
        
        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>
        
        <button id="connectBtn" class="btn" onclick="startVerification()">
            🔗 ウォレット接続
        </button>
        
        <div id="walletInfo" class="wallet-info hidden"></div>
        
        <div id="result" class="status hidden"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://nft-verification-production.mona-syndicatextokyo.workers.dev';
        const urlParams = new URLSearchParams(window.location.search);
        const discordId = urlParams.get('discord_id');
        
        let currentWallet = null;
        let currentAddress = null;

        // デモウォレット（開発用）
        const demoWallet = {
            name: 'Demo Wallet',
            connect: async () => {
                return {
                    address: '0x1234567890abcdef1234567890abcdef12345678',
                    publicKey: '0x1234567890abcdef1234567890abcdef12345678'
                };
            },
            signMessage: async (message) => {
                return '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef';
            }
        };

        // ウォレット検出
        function detectWallet() {
            const walletPatterns = [
                'suiWallet', 'sui', 'wallet', 'suiet', 'martian', 'ethos', 'onekey'
            ];
            
            for (const pattern of walletPatterns) {
                if (window[pattern]) {
                    return window[pattern];
                }
            }
            
            // 開発環境ではデモウォレットを使用
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log('Using demo wallet for development');
                return demoWallet;
            }
            
            return null;
        }

        // 認証開始
        async function startVerification() {
            if (!discordId) {
                showError('Discord IDが見つかりません');
                return;
            }

            const connectBtn = document.getElementById('connectBtn');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');

            try {
                // ステップ1: ウォレット接続
                updateStatus('ウォレットを検出中...', 'connecting');
                updateProgress(20);
                
                currentWallet = detectWallet();
                if (!currentWallet) {
                    showError('Suiウォレットが見つかりません。Suiet、Martian、Ethosなどのウォレットをインストールしてください。');
                    return;
                }

                updateStatus('ウォレットに接続中...', 'connecting');
                updateProgress(40);

                const connection = await currentWallet.connect();
                currentAddress = connection.address;
                
                document.getElementById('walletInfo').innerHTML = `接続済み: ${currentAddress}`;
                document.getElementById('walletInfo').classList.remove('hidden');

                updateStatus('認証メッセージを生成中...', 'connecting');
                updateProgress(60);

                // ステップ2: ナンス取得
                const nonceResponse = await fetch(`${API_BASE_URL}/nonce`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discord_id: discordId })
                });

                if (!nonceResponse.ok) {
                    throw new Error('ナンスの取得に失敗しました');
                }

                const { nonce } = await nonceResponse.json();

                updateStatus('メッセージに署名中...', 'connecting');
                updateProgress(80);

                // ステップ3: メッセージ署名
                const message = `NFT Verification\n\nDiscord ID: ${discordId}\nNonce: ${nonce}\nTimestamp: ${Date.now()}`;
                const signature = await currentWallet.signMessage(message);

                updateStatus('認証を完了中...', 'connecting');
                updateProgress(90);

                // ステップ4: 認証送信
                const verifyResponse = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        discord_id: discordId,
                        wallet_address: currentAddress,
                        signature: signature,
                        nonce: nonce
                    })
                });

                if (!verifyResponse.ok) {
                    throw new Error('認証に失敗しました');
                }

                const result = await verifyResponse.json();
                updateProgress(100);

                if (result.success) {
                    showSuccess('🎉 認証が完了しました！\n\nDiscordでロールが付与され、DMが送信されます。');
                    connectBtn.disabled = true;
                    connectBtn.textContent = '✅ 認証完了';
                } else {
                    showError('認証に失敗しました: ' + (result.error || '不明なエラー'));
                }

            } catch (error) {
                console.error('Verification error:', error);
                showError('認証エラー: ' + error.message);
            }
        }

        function updateStatus(message, type = 'connecting') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function updateProgress(percent) {
            const progress = document.getElementById('progress');
            progress.style.width = percent + '%';
        }

        function showSuccess(message) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = 'status success';
            result.classList.remove('hidden');
        }

        function showError(message) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = 'status error';
            result.classList.remove('hidden');
        }

        // 初期化
        if (!discordId) {
            showError('Discord IDが指定されていません');
        } else {
            updateStatus('Discord認証の準備が完了しました');
        }
    </script>
</body>
</html>
